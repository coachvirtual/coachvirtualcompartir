<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Virtual - Santillana Compartir</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen w-screen relative flex flex-col items-center overflow-x-hidden overflow-y-auto bg-[#0f172a]">

    <img src="assets/fondo-coachvirtual-compartir.png" id="bg-image" alt="Fondo espacial">

    <div class="fixed top-0 w-full p-4 md:p-6 flex justify-between items-start sm:items-center z-50 glass-header border-b border-white/10 shadow-lg">
        <div class="h-10 sm:h-12 md:h-14 transition-all shrink-0 mt-1 sm:mt-0">
            <img src="assets/logo-compartir.png" alt="Logo Compartir" class="h-full w-auto object-contain drop-shadow-xl">
        </div>
        
        <div class="flex flex-col sm:flex-row gap-2 md:gap-4 items-end sm:items-center">
            <a href="https://www.edi.santillanacompartir.com.co/" target="_blank" rel="noopener noreferrer" data-analytics="outbound_edi" class="glass-panel text-white px-3 sm:px-4 md:px-6 py-1.5 sm:py-2 rounded-full text-[10px] sm:text-xs md:text-sm font-bold hover:bg-white/10 transition shadow-lg border border-white/20 text-center cyber-hover">
                Edi Compartir
            </a>
            <a href="https://www.santillanacompartir.com.co/" target="_blank" rel="noopener noreferrer" data-analytics="outbound_santillana" class="glass-panel text-white px-3 sm:px-4 md:px-6 py-1.5 sm:py-2 rounded-full text-[10px] sm:text-xs md:text-sm font-bold hover:bg-white/10 transition shadow-lg border border-white/20 text-center cyber-hover">
                Santillana Compartir
            </a>
        </div>
    </div>

    <div id="main-menu" class="text-center z-10 w-full max-w-6xl px-4 mt-32 md:mt-36 transition-all duration-500 transform scale-100 opacity-100 flex flex-col items-center pb-24 md:pb-12">
        
        <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-black text-white mb-6 uppercase drop-shadow-lg tracking-tight">Bienvenido a tu coach virtual</h1>
        
        <div class="w-full max-w-2xl mb-12 relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="search" class="w-5 h-5 text-slate-400 group-focus-within:text-indigo-400 transition-colors"></i>
            </div>
            <input type="text" id="global-search" placeholder="¿Qué necesitas aprender hoy? (Ej. Sopa de letras, Rúbricas...)" class="w-full glass-panel text-white placeholder-slate-400 rounded-full py-3 pl-12 pr-4 outline-none border border-white/20 focus:border-indigo-500/70 focus:ring-2 focus:ring-indigo-500/30 transition-all cyber-glow">
        </div>

        <div id="search-results" class="hidden w-full max-w-5xl mx-auto mb-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        </div>

        <div id="cards-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 md:gap-10 max-w-5xl mx-auto w-full items-center justify-items-center transition-all duration-500">
            <div class="card group w-[75%] sm:w-full max-w-[260px] md:max-w-[320px] overflow-hidden cursor-pointer rounded-[2rem] border-pink-500/30 hover:border-pink-400 shadow-[0_0_15px_rgba(236,72,153,0.1)] hover:shadow-[0_0_30px_rgba(236,72,153,0.3)]" onclick="openRoleSelection('Conocimientos')" data-analytics="click_conocimientos">
                <img src="assets/5.png" alt="Conocimientos" class="w-full h-auto block scale-[1.02] transition-transform duration-500 group-hover:scale-[1.08]">
            </div>
            <div class="card group w-[75%] sm:w-full max-w-[260px] md:max-w-[320px] overflow-hidden cursor-pointer rounded-[2rem] border-blue-500/30 hover:border-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.1)] hover:shadow-[0_0_30px_rgba(59,130,246,0.3)]" onclick="openRoleSelection('Progreso')" data-analytics="click_progreso">
                <img src="assets/6.png" alt="Progreso" class="w-full h-auto block scale-[1.02] transition-transform duration-500 group-hover:scale-[1.08]">
            </div>
            <div class="card group w-[75%] sm:w-full max-w-[260px] md:max-w-[320px] overflow-hidden cursor-pointer rounded-[2rem] sm:col-span-2 md:col-span-1 border-emerald-500/30 hover:border-emerald-400 shadow-[0_0_15px_rgba(16,185,129,0.1)] hover:shadow-[0_0_30px_rgba(16,185,129,0.3)]" onclick="openRoleSelection('Ingles')" data-analytics="click_ingles">
                <img src="assets/7.png" alt="Inglés" class="w-full h-auto block scale-[1.02] transition-transform duration-500 group-hover:scale-[1.08]">
            </div>
        </div>
    </div>

    <div id="section-view" class="hidden flex-col z-10 w-full max-w-5xl px-4 mt-32 md:mt-36 transition-all duration-500 transform scale-95 opacity-0 pb-24 md:pb-12">
        <div class="w-full flex justify-start mb-4 md:mb-6">
            <button onclick="closeSection()" class="glass-panel text-white px-4 md:px-6 py-2 rounded-full font-bold flex items-center gap-2 hover:bg-white/10 transition shadow-lg border border-white/20 text-sm md:text-base cyber-hover">
                <i data-lucide="arrow-left" class="w-4 h-4 md:w-5 md:h-5"></i> Volver al menú principal
            </button>
        </div>
        <div id="section-content" class="w-full glass-panel p-6 sm:p-8 md:p-12 rounded-[2rem] text-white flex flex-col transition-opacity duration-500 cyber-glow-panel">
        </div>
    </div>

    <div id="video-modal" class="hidden fixed inset-0 z-[100] bg-black/95 backdrop-blur-lg p-4 items-center justify-center fade-in">
        <div class="relative w-full max-w-5xl flex flex-col gap-4">
            <div class="flex justify-end w-full">
                <button onclick="closeVideoModal()" class="bg-white/10 hover:bg-red-500 text-white p-2.5 rounded-full transition-all border border-white/20 shadow-[0_0_15px_rgba(239,68,68,0.3)]">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div class="relative w-full aspect-video bg-black rounded-2xl overflow-hidden shadow-[0_0_50px_rgba(79,70,229,0.3)] border border-white/10">
                <iframe id="modal-iframe" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
            <div class="text-center">
                <a id="modal-external-link" href="#" target="_blank" data-analytics="contingency_youtube" class="inline-flex items-center gap-2 text-xs sm:text-sm text-slate-400 hover:text-white transition-colors bg-white/5 px-4 py-2 rounded-full border border-white/10 hover:border-white/30">
                    <i data-lucide="external-link" class="w-4 h-4"></i> ¿No carga el video? Haz clic aquí para verlo directamente en YouTube
                </a>
            </div>
        </div>
    </div>

    <button onclick="toggleChat()" data-analytics="open_bot" class="fixed bottom-6 right-6 md:bottom-8 md:right-8 z-40 w-14 h-14 md:w-16 md:h-16 bg-white/10 backdrop-blur-md border border-indigo-500/50 rounded-full flex items-center justify-center text-white shadow-[0_0_20px_rgba(79,70,229,0.4)] hover:scale-110 hover:bg-indigo-600/30 transition-all group">
        <i data-lucide="message-square" class="w-6 h-6 md:w-8 md:h-8 group-hover:text-indigo-200 transition-colors"></i>
    </button>

    <div id="chat-sidebar" class="fixed top-0 right-0 h-full w-full sm:w-[350px] md:w-[400px] glass-panel z-50 flex flex-col border-l border-indigo-500/20 shadow-[-10px_0_30px_rgba(0,0,0,0.5)]">
        <div class="p-4 md:p-6 border-b border-white/10 flex justify-between items-center bg-[#0f172a]/90 backdrop-blur-xl">
            <div class="flex items-center gap-3 md:gap-4">
                <div class="w-10 h-10 md:w-12 md:h-12 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-[0_0_20px_rgba(79,70,229,0.6)]">
                    <i data-lucide="bot" class="w-5 h-5 md:w-6 md:h-6"></i>
                </div>
                <div>
                    <h3 class="text-white font-black text-base md:text-lg tracking-wide">Coach Bot</h3>
                    <p class="text-[9px] md:text-[10px] text-green-400 font-bold uppercase tracking-widest flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse shadow-[0_0_8px_rgba(74,222,128,0.8)]"></span> En línea
                    </p>
                </div>
            </div>
            <button onclick="toggleChat()" class="text-white/50 hover:text-white transition bg-white/5 p-2 md:p-2.5 rounded-full hover:bg-red-500 border border-white/10">
                <i data-lucide="x" class="w-4 h-4 md:w-5 md:h-5"></i>
            </button>
        </div>
        <div id="chat-msgs" class="flex-1 overflow-y-auto p-4 md:p-6 custom-scroll flex flex-col gap-4 md:gap-5"></div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/bot.js"></script>
</body>
</html>
